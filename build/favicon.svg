<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
	<!-- Abyssal's own mark — the Eye (the game's hero symbol), replacing the web-sdk sample
	     favicon that ships identically in every template app (Stake review checks asset
	     uniqueness). Palette mirrors the in-game art: deep-navy abyss, gold rim, ember iris. -->
	<defs>
		<radialGradient id="iris" cx="50%" cy="45%" r="55%">
			<stop offset="0%" stop-color="#ffd76a"/>
			<stop offset="35%" stop-color="#ff7a2f"/>
			<stop offset="75%" stop-color="#c81e12"/>
			<stop offset="100%" stop-color="#6e0a06"/>
		</radialGradient>
		<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#0a1a3a"/>
			<stop offset="100%" stop-color="#010313"/>
		</linearGradient>
	</defs>
	<rect x="1" y="1" width="62" height="62" rx="14" fill="url(#bg)"/>
	<!-- almond eye: two arcs meeting at the corners, gold rim -->
	<path d="M6 32 Q32 8 58 32 Q32 56 6 32 Z" fill="#1a0c08" stroke="#ffd76a" stroke-width="3" stroke-linejoin="round"/>
	<!-- iris -->
	<circle cx="32" cy="32" r="13.5" fill="url(#iris)"/>
	<!-- vertical slit pupil -->
	<path d="M32 20.5 Q35.4 32 32 43.5 Q28.6 32 32 20.5 Z" fill="#12030a"/>
	<!-- glint -->
	<circle cx="27.5" cy="26.5" r="2.6" fill="#fff3d6" opacity="0.9"/>
</svg>
