<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Win Meter — PixiJS</title>
		<style>
			:root {
				--bg-0: #0a0712;
				--line: #2a1d44;
				--gold: #e9dcb8;
				--violet: #c77dff;
				--violet-dim: #7b4bb0;
				--ink: #cdbfe6;
				--ink-dim: #6c5d8a;
			}
			* {
				box-sizing: border-box;
			}
			html,
			body {
				margin: 0;
				height: 100%;
			}
			body {
				background:
					radial-gradient(1100px 520px at 50% -8%, #251646 0%, rgba(37, 22, 70, 0) 60%),
					radial-gradient(900px 600px at 50% 120%, #1a0f33 0%, rgba(26, 15, 51, 0) 55%), var(--bg-0);
				color: var(--ink);
				font-family:
					'Segoe UI',
					system-ui,
					-apple-system,
					sans-serif;
				min-height: 100%;
				display: flex;
				flex-direction: column;
				align-items: center;
				padding: 32px 18px 48px;
			}
			.eyebrow {
				font-size: 11px;
				letter-spacing: 0.42em;
				text-transform: uppercase;
				color: var(--violet-dim);
				font-weight: 700;
				margin: 0 0 6px;
			}
			h1 {
				margin: 0 0 4px;
				font-weight: 300;
				font-size: clamp(26px, 5vw, 40px);
				letter-spacing: 0.02em;
				color: var(--gold);
				font-family: 'Iowan Old Style', 'Palatino Linotype', Georgia, serif;
			}
			.sub {
				margin: 0 0 26px;
				color: var(--ink-dim);
				font-size: 13.5px;
				max-width: 560px;
				text-align: center;
				line-height: 1.5;
			}
			#stage {
				width: min(820px, 100%);
				min-height: 120px;
				filter: drop-shadow(0 24px 60px rgba(120, 60, 200, 0.22));
			}
			#stage canvas {
				display: block;
			}
			.controls {
				display: flex;
				gap: 10px;
				flex-wrap: wrap;
				justify-content: center;
				margin-top: 28px;
			}
			button {
				appearance: none;
				cursor: pointer;
				font: inherit;
				font-size: 13px;
				font-weight: 600;
				letter-spacing: 0.02em;
				color: var(--ink);
				background: linear-gradient(#1d1233, #150b26);
				border: 1px solid var(--line);
				border-radius: 11px;
				padding: 11px 18px;
				transition:
					transform 0.08s ease,
					border-color 0.2s,
					color 0.2s,
					box-shadow 0.2s;
			}
			button:hover {
				border-color: var(--violet-dim);
				color: #fff;
				box-shadow:
					0 0 0 1px rgba(199, 125, 255, 0.18),
					0 8px 22px rgba(123, 75, 176, 0.22);
			}
			button:active {
				transform: translateY(1px);
			}
			button:focus-visible {
				outline: 2px solid var(--violet);
				outline-offset: 2px;
			}
			button.primary {
				color: #150826;
				background: linear-gradient(#e7c8ff, #c77dff);
				border-color: #d9a8ff;
				font-weight: 700;
			}
			button[aria-pressed='true'] {
				border-color: var(--violet);
				color: #fff;
				box-shadow: inset 0 0 0 1px rgba(199, 125, 255, 0.3);
			}
			.hint {
				margin-top: 18px;
				color: var(--ink-dim);
				font-size: 12px;
				text-align: center;
			}
			code {
				color: var(--violet);
				background: rgba(199, 125, 255, 0.08);
				padding: 1px 6px;
				border-radius: 5px;
				font-size: 12px;
			}
			#err {
				display: none;
				white-space: pre-wrap;
				background: #2a0d12;
				border: 1px solid #6e2030;
				color: #ffb4b4;
				padding: 14px 16px;
				border-radius: 10px;
				font:
					12px/1.5 ui-monospace,
					Menlo,
					Consolas,
					monospace;
				max-width: 820px;
				margin-top: 14px;
			}
		</style>
	</head>
	<body>
		<p class="eyebrow">Slots · Win Meter</p>
		<h1>Connection Meter</h1>
		<p class="sub">
			Every connection charges the meter and ticks the multiplier up by one. Fill it to the eye to
			max out.
		</p>
		<div id="stage" aria-label="Win meter"></div>
		<pre id="err"></pre>
		<div class="controls">
			<button id="hit" class="primary">+ Connection</button>
			<button id="auto" aria-pressed="false">Auto play</button>
			<button id="reset">Reset</button>
			<button id="debug" aria-pressed="false">Show track</button>
		</div>
		<p class="hint">
			Drop-in API: <code>meter.addConnection()</code> · <code>meter.reset()</code> ·
			<code>meter.setConnections(n)</code>
		</p>

			function showErr(m) {
				const el = document.getElementById('err');
				el.style.display = 'block';
				el.textContent = '⚠ ' + m;
			}
			function loadPixi() {
				const cdns = [
					'https://cdnjs.cloudflare.com/ajax/libs/pixi.js/8.6.6/pixi.min.js',
					'https://cdn.jsdelivr.net/npm/pixi.js@8.6.6/dist/pixi.min.js',
					'https://unpkg.com/pixi.js@8.6.6/dist/pixi.min.js',
				];
				return new Promise((res, rej) => {
					let i = 0;
					const go = () => {
						if (i >= cdns.length) {
							rej(new Error('Could not load PixiJS from any CDN.'));
							return;
						}
						const s = document.createElement('script');
						s.src = cdns[i++];
						s.onload = () => res();
						s.onerror = () => {
							s.remove();
							go();
						};
						document.head.appendChild(s);
					};
					go();
				});
			}

			/* ============================================================
   CONFIG — coordinates in the bar's native space (691 x 152).
   Toggle "Show track" to see the hit-boxes and fine-tune.
   ============================================================ */
			const CFG = {
				texW: 691,
				texH: 152,
				maxConnections: 10,
				// The recessed channel is split by the eye into two grooves; the fill
				// flows left -> right through both and the eye gap is skipped.
				trackSegments: [
					{ x: 62, y: 67, w: 256, h: 28, r: 13 }, // left groove
					{ x: 360, y: 67, w: 206, h: 28, r: 10 }, // ruler groove (right of the eye)
				],
				orb: { x: 630, y: 79, r: 33, textDy: 2 }, // multiplier orb (textDy nudges digits to optical centre)
				eye: { x: 351, y: 45, r: 30 },
				gem: { x: 33, y: 78, r: 12 },
				fillLo: 0x5a1aa0,
				fillHi: 0xe9b6ff,
				edge: 0xffffff,
			};

			async function main() {
				await loadPixi();
				const app = new PIXI.Application();
				await app.init({
					width: CFG.texW,
					height: CFG.texH,
					backgroundAlpha: 0,
					antialias: true,
					resolution: Math.min(window.devicePixelRatio || 1, 2),
					autoDensity: true,
				});
				const stage = document.getElementById('stage');
				stage.appendChild(app.canvas);
				app.canvas.style.width = '100%';
				app.canvas.style.height = 'auto';

				const img = new Image();
				img.src = BAR_URI;
				await img.decode();
				const barTex = PIXI.Texture.from(img);

				/* tween engine */
				const tweens = [];
				const easeOut = (t) => 1 - Math.pow(1 - t, 3);
				const easeOutBack = (t) => {
					const c1 = 1.70158,
						c3 = c1 + 1;
					return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
				};
				function tween(o) {
					tweens.push(Object.assign({ t: 0, ease: easeOut }, o));
				}
				app.ticker.add(({ deltaMS }) => {
					for (let i = tweens.length - 1; i >= 0; i--) {
						const tw = tweens[i];
						tw.t += deltaMS;
						const p = Math.min(tw.t / tw.dur, 1),
							v = tw.from + (tw.to - tw.from) * tw.ease(p);
						tw.onUpdate && tw.onUpdate(v, p);
						if (p >= 1) {
							tw.onDone && tw.onDone();
							tweens.splice(i, 1);
						}
					}
				});

				function glowTexture(hex) {
					const s = 128,
						c = document.createElement('canvas');
					c.width = c.height = s;
					const g = c.getContext('2d'),
						r = `#${hex.toString(16).padStart(6, '0')}`;
					const grd = g.createRadialGradient(s / 2, s / 2, 0, s / 2, s / 2, s / 2);
					grd.addColorStop(0, r);
					grd.addColorStop(0.35, r);
					grd.addColorStop(1, 'rgba(0,0,0,0)');
					g.fillStyle = grd;
					g.beginPath();
					g.arc(s / 2, s / 2, s / 2, 0, 7);
					g.fill();
					return PIXI.Texture.from(c);
				}
				const glowViolet = glowTexture(0xc77dff),
					glowWhite = glowTexture(0xffffff);

				const root = new PIXI.Container();
				app.stage.addChild(root);

				/* === LAYER ORDER (critical): bar art is OPAQUE, so the fill and
     glows must be drawn ON TOP of it, not underneath. === */
				// 1) bar artwork at the bottom
				const bar = new PIXI.Sprite(barTex);
				bar.width = CFG.texW;
				bar.height = CFG.texH;
				root.addChild(bar);

				// 2) fill inside the channel (on top of the dark recess)
				const fill = new PIXI.Graphics();
				root.addChild(fill);
				const edgeGlow = new PIXI.Sprite(glowWhite);
				edgeGlow.anchor.set(0.5);
				edgeGlow.blendMode = 'add';
				const _seg0 = CFG.trackSegments[0];
				edgeGlow.width = edgeGlow.height = _seg0.h * 2.6;
				edgeGlow.alpha = 0;
				edgeGlow.y = _seg0.y + _seg0.h / 2;
				root.addChild(edgeGlow);

				// 3) eye + gem flare glows (on top of the art so they actually show)
				function makeGlow(tex, cx, cy, baseR) {
					const s = new PIXI.Sprite(tex);
					s.anchor.set(0.5);
					s.x = cx;
					s.y = cy;
					s.blendMode = 'add';
					s.width = s.height = baseR * 4;
					s.alpha = 0;
					root.addChild(s);
					return s;
				}
				const eyeGlow = makeGlow(glowViolet, CFG.eye.x, CFG.eye.y, CFG.eye.r);
				const gemGlow = makeGlow(glowViolet, CFG.gem.x, CFG.gem.y, CFG.gem.r);

				// 4) orb glow + multiplier text
				const orbGlow = new PIXI.Sprite(glowViolet);
				orbGlow.anchor.set(0.5);
				orbGlow.x = CFG.orb.x;
				orbGlow.y = CFG.orb.y;
				orbGlow.blendMode = 'add';
				orbGlow.width = orbGlow.height = CFG.orb.r * 3.4;
				orbGlow.alpha = 0.18;
				root.addChild(orbGlow);

				const mult = new PIXI.Text({
					text: '0',
					style: {
						fontFamily: 'Georgia,"Times New Roman",serif',
						fontSize: 32,
						fontWeight: '700',
						fill: 0xfff3d4,
						align: 'center',
						stroke: { color: 0x2a0e4a, width: 4, join: 'round' },
						dropShadow: { color: 0x000000, alpha: 0.45, blur: 3, distance: 1, angle: Math.PI / 2 },
					},
				});
				mult.anchor.set(0.5, 0.5);
				mult.x = CFG.orb.x;
				mult.y = CFG.orb.y + (CFG.orb.textDy || 0);
				mult.resolution = 2;
				root.addChild(mult);

				// 5) debug outlines
				const dbg = new PIXI.Graphics();
				dbg.visible = false;
				root.addChild(dbg);
				(function () {
					dbg.clear();
					CFG.trackSegments.forEach((t) =>
						dbg
							.roundRect(t.x, t.y, t.w, t.h, t.r)
							.stroke({ width: 1, color: 0x00ffaa, alpha: 0.95 }),
					);
					dbg
						.circle(CFG.orb.x, CFG.orb.y, CFG.orb.r)
						.stroke({ width: 1, color: 0x00ffaa, alpha: 0.95 })
						.circle(CFG.eye.x, CFG.eye.y, CFG.eye.r)
						.stroke({ width: 1, color: 0xffcc00, alpha: 0.7 })
						.circle(CFG.gem.x, CFG.gem.y, CFG.gem.r)
						.stroke({ width: 1, color: 0xffcc00, alpha: 0.7 });
				})();

				const SEGS = CFG.trackSegments;
				const TOTAL_W = SEGS.reduce((s, seg) => s + seg.w, 0);
				function drawFill(progress) {
					fill.clear();
					let rem = TOTAL_W * progress,
						leadX = null;
					for (const seg of SEGS) {
						const wseg = Math.max(0, Math.min(seg.w, rem));
						if (wseg > 0.5) {
							const r = Math.min(seg.r, wseg / 2);
							fill.roundRect(seg.x, seg.y, wseg, seg.h, r).fill({ color: CFG.fillLo });
							fill
								.roundRect(seg.x, seg.y, wseg, seg.h * 0.52, r)
								.fill({ color: CFG.fillHi, alpha: 0.6 });
							fill
								.roundRect(seg.x + 1.5, seg.y + 1.5, Math.max(0, wseg - 3), 2.5, 2)
								.fill({ color: 0xffffff, alpha: 0.55 });
							fill
								.rect(seg.x + wseg - 2, seg.y + 2, 3, seg.h - 4)
								.fill({ color: CFG.edge, alpha: 0.95 });
							leadX = seg.x + wseg;
						}
						rem -= seg.w;
					}
					if (leadX == null) edgeGlow.alpha = 0;
					else edgeGlow.x = leadX;
				}

				const state = { connections: 0, progress: 0 };
				drawFill(0);

				function pulseGlows() {
					[eyeGlow, gemGlow].forEach((g) => {
						g.alpha = 0.85;
						tween({ from: 0.85, to: 0, dur: 520, onUpdate: (v) => (g.alpha = v) });
					});
					orbGlow.alpha = 0.95;
					tween({ from: 0.95, to: 0.18, dur: 560, onUpdate: (v) => (orbGlow.alpha = v) });
					edgeGlow.alpha = 1;
					tween({ from: 1, to: 0.3, dur: 400, onUpdate: (v) => (edgeGlow.alpha = v) });
				}
				function popMultiplier() {
					tween({
						from: 1.55,
						to: 1,
						dur: 420,
						ease: easeOutBack,
						onUpdate: (v) => mult.scale.set(v),
					});
					mult.tint = 0xffffff;
					tween({
						from: 0,
						to: 1,
						dur: 480,
						onUpdate: (p) => {
							const l = (a, b) => Math.round(a + (b - a) * p);
							mult.tint = (l(0xff, 0xff) << 16) | (l(0xff, 0xf3) << 8) | l(0xff, 0xd4);
						},
					});
				}
				function celebrate() {
					const flash = new PIXI.Sprite(glowWhite);
					flash.anchor.set(0.5);
					flash.blendMode = 'add';
					const _a = SEGS[0],
						_z = SEGS[SEGS.length - 1],
						_l = _a.x,
						_r = _z.x + _z.w;
					flash.x = (_l + _r) / 2;
					flash.y = _a.y + _a.h / 2;
					flash.width = (_r - _l) * 1.12;
					flash.height = _a.h * 3.5;
					root.addChild(flash);
					tween({
						from: 0.85,
						to: 0,
						dur: 750,
						onUpdate: (v) => (flash.alpha = v),
						onDone: () => flash.destroy(),
					});
					orbGlow.alpha = 1;
					tween({ from: 1, to: 0.3, dur: 900, onUpdate: (v) => (orbGlow.alpha = v) });
				}

				const meter = {
					addConnection() {
						state.connections++;
						mult.text = String(state.connections);
						const target = Math.min(state.connections / CFG.maxConnections, 1);
						tween({
							from: state.progress,
							to: target,
							dur: 560,
							onUpdate: (v) => {
								state.progress = v;
								drawFill(v);
							},
						});
						pulseGlows();
						popMultiplier();
						if (state.connections === CFG.maxConnections) setTimeout(celebrate, 280);
					},
					setConnections(n) {
						state.connections = Math.max(0, n);
						mult.text = String(state.connections);
						const target = Math.min(state.connections / CFG.maxConnections, 1);
						tween({
							from: state.progress,
							to: target,
							dur: 400,
							onUpdate: (v) => {
								state.progress = v;
								drawFill(v);
							},
						});
					},
					reset() {
						state.connections = 0;
						mult.text = '0';
						tween({
							from: state.progress,
							to: 0,
							dur: 400,
							onUpdate: (v) => {
								state.progress = v;
								drawFill(v);
							},
						});
						orbGlow.alpha = 0.18;
					},
				};

				const $ = (id) => document.getElementById(id);
				$('hit').onclick = () => meter.addConnection();
				$('reset').onclick = () => {
					stopAuto();
					meter.reset();
				};
				$('debug').onclick = (e) => {
					dbg.visible = !dbg.visible;
					e.currentTarget.setAttribute('aria-pressed', dbg.visible);
				};
				let autoTimer = null;
				function stopAuto() {
					if (autoTimer) {
						clearInterval(autoTimer);
						autoTimer = null;
					}
					$('auto').setAttribute('aria-pressed', 'false');
				}
				$('auto').onclick = (e) => {
					if (autoTimer) {
						stopAuto();
						return;
					}
					e.currentTarget.setAttribute('aria-pressed', 'true');
					if (state.connections >= CFG.maxConnections + 6) meter.reset();
					autoTimer = setInterval(() => {
						meter.addConnection();
						if (state.connections >= CFG.maxConnections + 6) stopAuto();
					}, 620);
				};

				window.meter = meter;
			}
			main().catch((e) => {
				console.error(e);
				showErr((e && e.message) || String(e));
			});
		</script>
	</body>
</html>
