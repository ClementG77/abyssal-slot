<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<!-- Stake compliance: the build must reach no external sources (strict XSS policy) — this
		     used to load Proxima Nova live from Adobe Typekit, exactly the "downloading fonts from
		     external servers" issue Stake's own review guide calls out by name. Abyssal's own UI
		     never references proxima-nova (it's Cinzel/AbyssalBitmap throughout); only a couple of
		     generic SDK-package fallbacks (components-shared's Popup/Button) named it, and those
		     now degrade cleanly to the `sans-serif` already next in their font stack — no local
		     replacement font needed. -->
		<!-- `maximum-scale`/`user-scalable=no` stop the zoom gestures on Android; `viewport-fit=cover`
		     lets the scene fill past the notch. iOS Safari has ignored these since iOS 10, so they
		     are only half the story — the `touch-action` rule below is what covers iOS. -->
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
		/>
		<style>
			/* Stake compliance: double-tap-to-zoom must be off on mobile.
			   `manipulation` means a touch may only pan or pinch-zoom — the browser stops waiting
			   for a possible second tap, so double-tap zoom never fires (and the legacy ~300ms tap
			   delay goes with it, making the spin button feel instant). This is the part iOS
			   honours, since it ignores the meta above.
			   Deliberately NOT `none`: that would also kill panning and freeze the internally
			   scrolling panels (`.scrollY`, the game-info sheet). touch-action isn't inherited,
			   but a touch is subject to its ancestors' values too, so `html` covers the whole
			   tree; `body` is named for defensiveness. */
			html,
			body {
				touch-action: manipulation;
			}
			/* The canvas needs `!important`: pixi-svelte's InitialiseApplication.svelte writes
			   `touchAction = 'auto'` INLINE on it (undoing Pixi's own 'none' so the page can still
			   be scrolled by touch — pixijs#4824), and an inline style beats a plain selector. That
			   left double-tap zoom live on the one element covering most of the screen. Overriding
			   to `manipulation` keeps the SDK's intent — panning and pinch-zoom still work, only
			   double-tap zoom is dropped — so this is a narrowing of 'auto', not a revert to
			   'none'. */
			canvas {
				touch-action: manipulation !important;
			}
		</style>
		%sveltekit.head%
	</head>
	<body style="margin: 0; padding: 0; overflow: hidden; background-color: black">
		<div>%sveltekit.body%</div>
	</body>
</html>
